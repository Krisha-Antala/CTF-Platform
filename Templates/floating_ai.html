<!-- Floating AI Helper Icon -->
<div id="ai-helper-icon" style="position: fixed; bottom: 30px; right: 30px; 
            background: linear-gradient(135deg, #6366f1, #a855f7); 
            color: #fff; border-radius: 50%; width: 60px; height: 60px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4); 
            z-index: 9999; transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 24px; border: 2px solid rgba(255,255,255,0.1);" title="AI Agent Support"
  onmouseover="this.style.transform='scale(1.1)'; this.style.boxShadow='0 12px 40px rgba(99, 102, 241, 0.6)';"
  onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 8px 32px rgba(99, 102, 241, 0.4)';">
  🤖
</div>

<!-- AI Helper Chat Window -->
<div id="ai-helper-chat" style="position: fixed; bottom: 100px; right: 30px; 
            width: 380px; height: 550px; background: rgba(15, 15, 20, 0.95); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            color: #e5e7eb; border-radius: 20px; display: none; flex-direction: column; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); z-index: 9999; 
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;">

  <!-- Header -->
  <div style="padding: 20px; background: linear-gradient(90deg, #6366f1, #a855f7); 
                display:flex; justify-content:space-between; align-items:center; color: white;">
    <div style="display: flex; align-items: center; gap: 12px;">
      <div style="width: 10px; height: 10px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 10px #4ade80;">
      </div>
      <strong style="font-size: 1.1rem; letter-spacing: 0.5px;">⚡ AI ASSISTANT</strong>
    </div>
    <button id="ai-helper-close" style="background: rgba(255,255,255,0.1); border: none; color: #fff; 
                width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; 
                align-items: center; justify-content: center; transition: background 0.2s;">✕</button>
  </div>

  <!-- Messages Container -->
  <div id="chat-messages"
    style="flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth;">
    <div
      style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px 15px 15px 0; border: 1px solid rgba(255,255,255,0.05); align-self: flex-start; max-width: 85%;">
      <p style="margin: 0; font-size: 0.95rem; line-height: 1.5;">Welcome, Operator. I'm your tactical AI. Ask me about
        vulnerabilities, payloads, or logic. How can I assist?</p>
    </div>
  </div>

  <!-- Typing Indicator (Hidden by default) -->
  <div id="typing-indicator" style="padding: 0 20px 10px 20px; display: none; align-items: center; gap: 5px;">
    <div
      style="width: 6px; height: 6px; background: #6366f1; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;">
    </div>
    <div
      style="width: 6px; height: 6px; background: #6366f1; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; animation-delay: 0.2s;">
    </div>
    <div
      style="width: 6px; height: 6px; background: #6366f1; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; animation-delay: 0.4s;">
    </div>
  </div>

  <!-- Input Area -->
  <form id="chat-form"
    style="padding: 15px; background: rgba(0,0,0,0.2); border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px;">
    <input type="text" id="chat-input" placeholder="Query the AI..."
      style="flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); 
                      background: rgba(255,255,255,0.05); color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.2s;">
    <button type="submit"
      style="width: 44px; height: 44px; border-radius: 50%; background: #6366f1; 
                border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </form>
</div>

<style>
  @keyframes bounce {

    0%,
    80%,
    100% {
      transform: scale(0);
    }

    40% {
      transform: scale(1.0);
    }
  }

  #chat-messages::-webkit-scrollbar {
    width: 4px;
  }

  #chat-messages::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
  }

  #chat-input:focus {
    border-color: #6366f1 !important;
  }

  button:active {
    transform: scale(0.9) !important;
  }
</style>

<!-- Pass context to JS (challenge id/type/name) -->
<script>
  window.CTF_CONTEXT = {
    challenge_id: {{ ch[0] | tojson if ch is defined and ch else 'null' }},
  challenge_name: { { ch[1] | tojson if ch is defined and ch else '"General"' } },
  challenge_desc: { { ch[2] | tojson if ch is defined and ch else '"Explore and find vulnerabilities."' } },
  ciphertext: { { ciphertext | tojson if ciphertext is defined and ciphertext else '""' } }
  };
</script>

<!-- Include widget script -->
<script src="{{ url_for('static', filename='js/ai_helper.js') }}"></script>
