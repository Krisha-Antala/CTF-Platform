{% extends "base.html" %}

{% block title %}Login - CTF Platform{% endblock %}

{% block content %}
<div class="center-screen">
    <div class="card">
        <h2 class="glitch-header" data-text="CTF LOGIN">CTF LOGIN</h2>

        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="text-center mt-4">
            <p style="color: var(--color-text-muted);">New here? <a href="/register">Register</a></p>
        </div>
    </div>
</div>
{% endblock %}
